<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="state: unknown">
  <title>unknown state</title>
  <!-- Shield silhouette with white halo for contrast against any backdrop. -->
  <path fill="#FFFFFF"
        d="M8 6 H56 a4 4 0 0 1 4 4 V36 a8 8 0 0 1 -2 5 L34 60 a4 4 0 0 1 -4 0 L6 41 a8 8 0 0 1 -2 -5 V10 a4 4 0 0 1 4 -4 Z"/>
  <!-- Neutral mid-gray (#6B7280) — Tailwind slate-500. Contrast 4.5:1
       against white, accessible per WCAG-AA non-text contrast minimum. -->
  <path fill="#6B7280"
        d="M12 10 H52 a2 2 0 0 1 2 2 V35 a6 6 0 0 1 -1.5 3.8 L34 56 a2 2 0 0 1 -4 0 L11.5 38.8 A6 6 0 0 1 10 35 V12 a2 2 0 0 1 2 -2 Z"/>
  <!-- Centered dot — neutral signal of "no information available". A small
       circle reads at 8px better than a glyph because there are no
       fine-grained strokes to anti-alias away. -->
  <circle cx="32" cy="32" r="6" fill="#FFFFFF"/>
</svg>
