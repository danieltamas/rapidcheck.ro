<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="state: verified">
  <title>verified state</title>
  <!-- Shield silhouette: rounded rectangle with a pointed bottom. At small
       sizes the point flattens into a soft V. White outline gives 1px of
       breathing room against the brand background, ensuring contrast for
       both colourblind users and at low DPI. -->
  <path fill="#FFFFFF"
        d="M8 6 H56 a4 4 0 0 1 4 4 V36 a8 8 0 0 1 -2 5 L34 60 a4 4 0 0 1 -4 0 L6 41 a8 8 0 0 1 -2 -5 V10 a4 4 0 0 1 4 -4 Z"/>
  <!-- Shield fill: WCAG-AA accessible green (#0F8A4F gives 4.7:1 against
       white, 7.3:1 against #003B73). Inset 4 units from the white edge. -->
  <path fill="#0F8A4F"
        d="M12 10 H52 a2 2 0 0 1 2 2 V35 a6 6 0 0 1 -1.5 3.8 L34 56 a2 2 0 0 1 -4 0 L11.5 38.8 A6 6 0 0 1 10 35 V12 a2 2 0 0 1 2 -2 Z"/>
  <!-- Check glyph: bold 7-unit stroke as a polygon. Designed to read at
       ~8px tall — the inflection point is exaggerated so it doesn't blob. -->
  <path fill="#FFFFFF"
        d="M22 32 L18 36 L29 47 L48 28 L44 24 L29 39 Z"/>
</svg>
